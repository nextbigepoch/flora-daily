name: Flora Daily Feishu Push

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 每天北京时间 14:00（UTC 06:00）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flora-daily-feishu
  cancel-in-progress: false

jobs:
  publish-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f -v

      - name: Install render dependencies
        run: npm install --no-audit --no-fund

      - name: Generate daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: node scripts/generate_daily_brief.mjs

      - name: Build publish directory
        run: |
          mkdir -p public
          cp -R index.html styles.css brief-loader.js assets content public/

      - name: Render PDF and screenshot
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          "$CHROME_BIN" --version
          CHROME_BIN="$CHROME_BIN" node scripts/render_assets.mjs public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Flora Daily to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FLORA_DAILY_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          FLORA_DAILY_PDF_URL: ${{ steps.deployment.outputs.page_url }}flora-daily.pdf
          FLORA_DAILY_IMAGE_URL: ${{ steps.deployment.outputs.page_url }}flora-daily.png
        run: python3 scripts/send_feishu.py
