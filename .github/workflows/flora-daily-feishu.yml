name: Flora Daily Feishu Push

on:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC.
    - cron: "30 0 * * *"
  workflow_dispatch:

concurrency:
  group: flora-daily-feishu
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Flora Daily to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FLORA_DAILY_PAGE_URL: ${{ secrets.FLORA_DAILY_PAGE_URL }}
          FLORA_DAILY_PDF_URL: ${{ secrets.FLORA_DAILY_PDF_URL }}
          FLORA_DAILY_IMAGE_URL: ${{ secrets.FLORA_DAILY_IMAGE_URL }}
        run: python3 scripts/send_feishu.py
